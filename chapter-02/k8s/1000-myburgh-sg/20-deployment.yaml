apiVersion: apps/v1
kind: Deployment
metadata:
  name: site
  namespace: myburgh-sg
spec:
  replicas: 1
  selector:
    matchLabels: { app: site }
  template:
    metadata:
      labels: { app: site }
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: nginx
          image: nginxinc/nginx-unprivileged:1.27-alpine
          ports:
            - name: http
              containerPort: 8080
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          resources:
            requests: { cpu: 10m, memory: 16Mi }
            limits:   { cpu: 100m, memory: 64Mi }
          volumeMounts:
            - { name: html,      mountPath: /usr/share/nginx/html, readOnly: true }
            - { name: cache,     mountPath: /var/cache/nginx }
            - { name: run,       mountPath: /var/run }
            - { name: tmp,       mountPath: /tmp }
          readinessProbe:
            httpGet: { path: /, port: http }
          livenessProbe:
            httpGet: { path: /, port: http }
      volumes:
        - name: html
          configMap:
            name: site-content
        - name: cache
          emptyDir: {}
        - name: run
          emptyDir: {}
        - name: tmp
          emptyDir: {}
